<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin WM/M&S</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="hero">
    <div class="container brand">
      <h1>Acceso administrativo WM/M&S</h1>
      <p>PANEL PRIVADO</p>
    </div>
  </header>

  <main class="container grid">
    <section class="section">
      <h2>Login administrador</h2>
      <form id="admin-login-form" class="form-card">
        <div class="field">
          <label for="admin-username">Usuario</label>
          <input id="admin-username" name="username" required autocomplete="username" />
        </div>
        <div class="field">
          <label for="admin-password">Contrasena</label>
          <input id="admin-password" name="password" type="password" required autocomplete="current-password" />
        </div>
        <div class="inline-form">
          <button type="submit" class="btn primary">Ingresar</button>
          <a href="./" class="btn ghost">Volver al sitio publico</a>
        </div>
        <p id="admin-login-status" class="access-status">Ingresa con tus credenciales administrativas.</p>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById('admin-login-form');
    const status = document.getElementById('admin-login-status');

    async function request(url, options = {}) {
      const response = await fetch(url, {
        credentials: 'same-origin',
        headers: {
          'Content-Type': 'application/json',
          ...(options.headers || {}),
        },
        ...options,
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(body.error || 'Error de autenticacion');
      }
      return body;
    }

    async function verifySession() {
      try {
        await request('/api/admin/session');
        window.location.href = '/admin.html';
      } catch (_error) {
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());
      try {
        status.textContent = 'Validando credenciales...';
        await request('/api/admin/login', {
          method: 'POST',
          body: JSON.stringify(payload),
        });
        window.location.href = '/admin.html';
      } catch (error) {
        status.textContent = error.message;
      }
    });

    verifySession();
  </script>
</body>
</html>
