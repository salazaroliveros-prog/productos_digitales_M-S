<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CONSTRUCTORA WM/M&S - Catálogo</title>
    <style>
        :root { --primary: #1a2a3a; --accent: #f39c12; }
        body { font-family: 'Arial', sans-serif; background: #f4f4f4; color: var(--primary); margin: 0; padding: 20px; }
        header { text-align: center; margin-bottom: 40px; }
        .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 300px; margin: 0 auto; }
        .card img { width: 100%; border-radius: 5px; background: #eee; height: 150px; object-fit: cover; }
        .btn-vender { background: var(--accent); color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; width: 100%; margin-top: 15px; font-weight: bold; }
        h1 { margin-bottom: 5px; }
        p { margin: 5px 0; }
    </style>
</head>
<body>
    <header>
        <h1>CONSTRUCTORA WM/M&S</h1>
        <p>CONSTRUYENDO EL FUTURO</p>
    </header>

    <main id="app-container">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1518780664697-55e3ad937233?auto=format&fit=crop&q=80&w=800" alt="Diseño Colonial">
            <h3>Diseño Colonial 120m²</h3>
            <p>Precio Materiales: <span id="costo-mat">Q0.00</span></p>
            <p>Mano de Obra: <span id="costo-mo">Q0.00</span></p>
            <button class="btn-vender">Comprar Planos</button>
        </div>
    </main>
</body>
</html>
