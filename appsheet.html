<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App de Cuantificacion | WM/M&S</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="public-body flow-body" data-flow-screen="appsheet">
  <header class="flow-header">
    <div class="container flow-topbar">
      <div>
        <p class="flow-logo">WM/M&S</p>
        <p class="flow-sub">APP DE CUANTIFICACION</p>
      </div>
      <nav class="flow-nav">
        <a href="./index.html">Inicio</a>
        <a href="./appsheet.html" class="is-current">AppSheet</a>
      </nav>
    </div>
  </header>

  <main class="container flow-main">
    <section class="tablet-shell">
      <header class="tablet-header">
        <h2>CASA COLONIAL 120m2</h2>
        <p>Vista tecnica del cliente</p>
      </header>

      <table id="appsheet-table" class="admin-table">
        <thead>
          <tr>
            <th>Insumo</th>
            <th>Inventario inicial</th>
            <th>Entradas</th>
            <th>Salidas</th>
            <th>Balance actual</th>
          </tr>
        </thead>
        <tbody>
          <tr data-inicial="50">
            <td>Block 50kg</td>
            <td>50.00</td>
            <td><input type="number" step="0.01" value="0" data-col="entrada" title="Entradas de Block" placeholder="0" /></td>
            <td><input type="number" step="0.01" value="0" data-col="salida" title="Salidas de Block" placeholder="0" /></td>
            <td data-col="balance">50.00</td>
          </tr>
          <tr data-inicial="1200">
            <td>Cemento UGC</td>
            <td>1200.00</td>
            <td><input type="number" step="0.01" value="0" data-col="entrada" title="Entradas de Cemento" placeholder="0" /></td>
            <td><input type="number" step="0.01" value="0" data-col="salida" title="Salidas de Cemento" placeholder="0" /></td>
            <td data-col="balance">1200.00</td>
          </tr>
          <tr data-inicial="85">
            <td>Hierro 3/8</td>
            <td>85.00</td>
            <td><input type="number" step="0.01" value="0" data-col="entrada" title="Entradas de Hierro" placeholder="0" /></td>
            <td><input type="number" step="0.01" value="0" data-col="salida" title="Salidas de Hierro" placeholder="0" /></td>
            <td data-col="balance">85.00</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <div id="flow-toast" class="toast"></div>
  <script src="./flow.js"></script>
</body>
</html>
