<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WM/M&S - Construyendo el Futuro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --wm-navy: #1a2a3a; --wm-orange: #f39c12; }
        .hero-card { border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-wm { background-color: var(--wm-orange); color: white; font-weight: bold; border-radius: 25px; }
        .price-tag { color: var(--wm-navy); font-size: 1.5rem; font-weight: 800; }
        .title-navy { color: var(--wm-navy); }
        #m2Slider { accent-color: var(--wm-orange); background: #e2e8f0; border-radius: 6px; height: 8px; cursor: pointer; }
        .slider-wrapper { background: #1a2a3a14; border-radius: 10px; padding: 0.6rem 0.75rem; }
    </style>
</head>
<body class="bg-light" data-screen="vitrina-bootstrap">

<div class="container py-4">
    <h2 class="text-center mb-4 title-navy">CATALOGO DE DISENOS WM/M&S</h2>

    <div class="card hero-card mb-4">
        <img id="heroImage" src="https://placehold.co/1200x600/e9eef5/1a2a3a?text=Diseno+Colonial" class="card-img-top" alt="Diseno Colonial">
        <div class="card-body">
            <h5 class="card-title" id="heroTitle">Casa Colonial Jutiapa (120m2)</h5>
            <p class="text-muted small" id="heroDesc">Optimizado para clima calido y acabados artesanales.</p>
            <hr>

            <label class="form-label">Ajustar area: <b id="areaLabel">120</b> m2</label>
            <div class="slider-wrapper">
              <input type="range" class="form-range" id="m2Slider" min="50" max="400" value="120" step="10" title="Ajustar area de construccion">
            </div>

            <div class="row mt-3 text-center">
                <div class="col-6 border-end">
                    <p class="mb-0 small text-uppercase">Materiales</p>
                    <p class="price-tag" id="costoMat">Q 102,060</p>
                </div>
                <div class="col-6">
                    <p class="mb-0 small text-uppercase">Mano de Obra</p>
                    <p class="price-tag" id="costoMO">Q 54,000</p>
                </div>
            </div>

            <p id="preciosFuente" class="text-muted small mt-2 mb-0">Tarifas base por m2: Materiales Q 850.50 | Mano de obra Q 450.00</p>

            <button id="btnConstruirFuturo" class="btn btn-wm w-100 mt-3 py-3" type="button">CONSTRUIR MI FUTURO</button>
        </div>
    </div>
</div>

<script src="./app.js"></script>
</body>
</html>
